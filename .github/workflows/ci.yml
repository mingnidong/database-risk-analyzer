name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check migrate_risk tests

      - name: Test
        run: pytest

      - name: Smoke test CLI
        run: |
          migrate-risk analyze examples/risky_migration.sql --format json | python -c "import json,sys; d=json.load(sys.stdin); assert d['findings']"
          migrate-risk analyze examples/safe_migration.sql --strict
